<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TMS — Ultra Security Control</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#0f1117;color:#e8eaf6;min-height:100vh;font-size:14px}
.center{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.card{background:#1a1d27;border:1px solid #2e3248;border-radius:16px;padding:28px;width:100%;max-width:400px}
.page{display:none;max-width:850px;margin:0 auto;padding:12px 12px 100px}
.box{background:#1a1d27;border:1px solid #2e3248;border-radius:12px;padding:16px;margin-bottom:14px}
.box-title{font-size:.7rem;color:#6b7280;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;font-weight:700}
.topbar{background:#1a1d27;border-bottom:1px solid #2e3248;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:200}
.brand{font-weight:800;color:#6c63ff;font-size:1.1rem}
.field{margin-bottom:12px}
.field label{display:block;font-size:.65rem;color:#6b7280;margin-bottom:4px;text-transform:uppercase;font-weight:600}
input,select{width:100%;background:#22263a;border:1px solid #2e3248;color:#e8eaf6;border-radius:8px;padding:10px;font-size:.9rem;outline:none}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px;border:none;border-radius:8px;font-size:.85rem;font-weight:700;cursor:pointer;transition:0.1s}
.btn:disabled{opacity:0.5;cursor:not-allowed}
.btn-full{width:100%}
.btn-green{background:#10b981;color:#fff}
.btn-purple{background:#6c63ff;color:#fff}
.btn-red{background:#ef4444;color:#fff}
.btn-gray{background:#22263a;color:#e8eaf6;border:1px solid #2e3248}
.srow{display:flex;gap:8px}.srow input{flex:1}

/* LOG & CARD STYLES */
.lr-card{background:#1a1d27;border:1px solid #2e3248;border-radius:12px;padding:20px;margin-top:10px}
.lr-layout{display:flex;gap:20px;justify-content:space-between;align-items:flex-start}
.lr-num{font-size:1.2rem;font-weight:800;color:#00d4aa;font-family:monospace}
.badge{font-size:.65rem;font-weight:800;padding:4px 10px;border-radius:20px}
.lr-preview-aside{width:160px;text-align:right}
.lr-thumb-wrapper{position:relative;display:inline-block;border-radius:8px;overflow:hidden;border:2px solid #2e3248;cursor:zoom-in}
.lr-thumb{width:100%;height:110px;object-fit:cover;display:block}
#zoom-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:2000;align-items:center;justify-content:center;padding:10px;cursor:zoom-out}
#zoom-img{max-width:100%;max-height:95vh;border-radius:8px}

.tbl-wrap{overflow-x:auto;border-radius:10px;border:1px solid #2e3248;margin-top:15px}
table{width:100%;border-collapse:collapse;font-size:.8rem}
th{background:#22263a;padding:10px;text-align:left;color:#6b7280;text-transform:uppercase}
td{padding:10px;border-top:1px solid #2e3248;white-space:nowrap}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(30px);background:#1a1d27;border:1px solid #2e3248;color:#e8eaf6;padding:10px 20px;border-radius:8px;font-size:.8rem;opacity:0;transition:0.3s;z-index:9999;text-align:center}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.logout{background:none;border:none;color:#6b7280;cursor:pointer}
</style>
</head>
<body>
<div id="toast" class="toast"></div>

<!-- ZOOM OVERLAY -->
<div id="zoom-overlay" onclick="this.style.display='none'">
    <img id="zoom-img" src="">
</div>

<!-- LOGIN PAGE -->
<div id="pg-login" class="center">
  <div class="card">
    <div style="font-size:2.2rem;font-weight:900;color:#6c63ff;margin-bottom:4px">TMS</div>
    <div style="color:#6b7280;font-size:.85rem;margin-bottom:24px">Supply Chain Guardian</div>
    <div class="field"><label>Username</label><input id="inp-u" placeholder="Enter username"/></div>
    <div class="field"><label>Password</label><input id="inp-p" type="password" placeholder="Enter password"/></div>
    <button class="btn btn-purple btn-full" onclick="doLogin()">Secure Login</button>
  </div>
</div>

<!-- MAIN PAGE -->
<div id="pg-main" class="page">
  <div class="topbar"><div><div class="brand">TMS</div><div class="role-tag" id="user-tag"></div></div><button class="logout" onclick="doLogout()">Logout</button></div>
  
  <!-- SUPER ADMIN DASHBOARD -->
  <div id="super-admin-tools" style="display:none">
    <div class="box" style="border-color:#ef444466">
      <div class="box-title" style="color:#ef4444">⚠️ Master Control & Security Log</div>
      <div style="display:flex; gap:8px; margin-bottom:12px">
        <button class="btn btn-red" style="flex:1" onclick="nuke('lr_master')">Wipe LRs</button>
        <button class="btn btn-red" style="flex:1" onclick="nuke('invoices')">Wipe Invoices</button>
      </div>
      <button class="btn btn-gray btn-full" onclick="loadAuditLogs()">🔍 Audit Activity Logs (Check Mischief)</button>
    </div>
    <div id="audit-log-area" style="display:none" class="box">
        <div class="box-title">Recent Irregular Activity Logs</div>
        <div id="log-list" style="font-size: 0.75rem; color:#6b7280; max-height:200px; overflow-y:auto"></div>
    </div>
  </div>

  <div class="box">
    <div class="box-title">Search Shipment</div>
    <div class="srow"><input id="srch-lr" placeholder="LR Number"/><button class="btn btn-gray" onclick="doSearch()">Search</button></div>
  </div>

  <div id="res-area"></div>

  <!-- OPERATION BLOCK -->
  <div id="action-box" style="display:none" class="box">
    <div class="box-title">Shipment Execution</div>
    <select id="status-sel" onchange="checkDelivered()" style="margin-bottom:12px">
      <option value="In Transit">In Transit</option>
      <option value="Reached WH">Reached WH</option>
      <option value="Out for Delivery">Out for Delivery</option>
      <option value="Delivered">Delivered (Scan Proof Required)</option>
    </select>
    <div id="photo-ui" style="display:none">
      <div style="display:flex; gap:8px; margin-bottom:10px">
        <button class="btn btn-gray" style="flex:1" onclick="$('cam').click()">📷 Take Proof</button>
        <button class="btn btn-gray" style="flex:1" onclick="$('gal').click()">🖼 Gallery</button>
      </div>
      <div id="prev-box" style="display:none; text-align:center; margin-bottom:10px">
        <img id="prev-img" style="max-width:100%; border-radius:8px; border:1px solid #10b981"/>
      </div>
    </div>
    <button class="btn btn-green btn-full" id="up-btn" onclick="doUnifiedUpdate()">Save & Log Activity</button>
  </div>
</div>

<input type="file" id="cam" accept="image/*" capture="environment" style="display:none" onchange="handleImg(this)"/>
<input type="file" id="gal" accept="image/*" style="display:none" onchange="handleImg(this)"/>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-storage-compat.js"></script>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyAPu5_BwUEu_xXdpXkmOJbuErGCGYqBUeE",
  authDomain:"wh-logistics-system.firebaseapp.com",
  projectId:"wh-logistics-system",
  storageBucket:"wh-logistics-system.firebasestorage.app",
  messagingSenderId:"279467148642",
  appId:"1:279467148642:web:c458996bca6c85ed33983b"
});
const db=firebase.firestore(), ST=firebase.storage(), TS=()=>firebase.firestore.FieldValue.serverTimestamp();
const $=id=>document.getElementById(id);
let CU=null, pBlob=null;

function toast(m,t=''){
  const el=$('toast'); el.textContent=m; el.className=`toast on ${t==='ok'?'ok':t==='err'?'err':''}`;
  setTimeout(()=>el.classList.remove('on'),3000);
}

async function doLogin(){
  const u=$('inp-u').value.trim(), p=$('inp-p').value.trim();
  const snap=await db.collection('users').doc(u).get();
  if(snap.exists && snap.data().password===p){
    const d = snap.data();
    CU={id:u,...d};
    const isSuper = (d.is_super === true || String(d.is_super) === 'true');
    const tag = isSuper ? '⭐ Super Admin' : d.role;
    $('user-tag').textContent=`${tag} · ${u}`;
    if(isSuper) $('super-admin-tools').style.display='block';
    $('pg-login').style.display='none'; $('pg-main').style.display='block';
  } else toast('Invalid Credentials','err');
}

function doLogout(){ location.reload(); }

async function doSearch(){
  const lr=$('srch-lr').value.trim().toUpperCase();
  if(!lr)return;
  const s=await db.collection('lr_master').doc(lr).get();
  if(!s.exists)return toast('LR Not Found','err');
  const d=s.data();
  const invs=await db.collection('invoices').where('lr_no','==',lr).get();
  $('res-area').innerHTML=renderLR(lr,d,invs.docs.map(x=>x.data()));
  if(CU.is_super || CU.role==='Transporter' || CU.role==='Admin'){
    $('action-box').style.display='block';
    $('action-box').dataset.lr=lr;
    $('status-sel').value=d.status||'In Transit';
    checkDelivered();
  }
}

function checkDelivered(){ $('photo-ui').style.display=$('status-sel').value==='Delivered'?'block':'none'; }
function zoomImg(url){ $('zoom-img').src = url; $('zoom-overlay').style.display = 'flex'; }

async function handleImg(inp){
  const f=inp.files[0]; if(!f)return;
  pBlob=await compress(f);
  $('prev-img').src=URL.createObjectURL(pBlob);
  $('prev-box').style.display='block';
}

// AUDIT LOG SYSTEM (Tracking Mischief)
async function doUnifiedUpdate(){
  const lr=$('action-box').dataset.lr;
  const st=$('status-sel').value;
  const btn=$('up-btn');
  btn.disabled=true; btn.textContent='Processing...';
  try {
    let upData = { status:st, last_updated:TS(), updated_by:CU.id };
    if(pBlob){
      const ref=ST.ref(`lr_copies/${lr}_${Date.now()}.jpg`);
      const snap = await ref.put(pBlob);
      upData.photo_url = await snap.ref.getDownloadURL();
    }
    await db.collection('lr_master').doc(lr).update(upData);
    
    // Create Audit Log Entry
    await db.collection('audit_logs').add({
        lr_no: lr,
        status_updated_to: st,
        user: CU.id,
        timestamp: TS(),
        action: 'STATUS_UPDATE'
    });

    toast('Success & Logged','ok');
    pBlob=null; $('prev-box').style.display='none';
    doSearch();
  } catch(e) { toast('Error: Check Network','err'); }
  finally { btn.disabled=false; btn.textContent='Save & Log Activity'; }
}

async function loadAuditLogs(){
    $('audit-log-area').style.display = 'block';
    const snap = await db.collection('audit_logs').orderBy('timestamp','desc').limit(50).get();
    let html = '';
    snap.forEach(d => {
        const log = d.data();
        const time = log.timestamp?.toDate ? log.timestamp.toDate().toLocaleString() : 'Just now';
        html += `<div style="padding:6px 0; border-bottom:1px solid #2e3248">
            <span style="color:#6c63ff">@${log.user}</span> updated <span style="color:#00d4aa">${log.lr_no}</span> to <b>${log.status_updated_to}</b>
            <div style="font-size:10px; opacity:0.6">${time}</div>
        </div>`;
    });
    $('log-list').innerHTML = html || 'No logs yet';
}

async function nuke(col){
  if(!CU.is_super) return toast('Unauthorized','err');
  if(!confirm(`PERMANENTLY PURGE ALL ${col}?`)) return;
  const snap = await db.collection(col).get();
  const batch = db.batch();
  snap.forEach(d => batch.delete(d.ref));
  await batch.commit();
  
  // Log the Purge Activity
  await db.collection('audit_logs').add({ action: 'PURGE_DATABASE', collection: col, user: CU.id, timestamp: TS() });
  toast(`${col} Purged`,'ok');
}

function renderLR(lr,d,invs){
  const c=d.status==='Delivered'?'#10b981':'#f59e0b';
  return `<div class="lr-card">
    <div class="lr-layout">
        <div class="lr-details">
            <div class="lr-head"><div class="lr-num">LR: ${lr}</div><span class="badge" style="background:${c}22;color:${c}">${d.status}</span></div>
            <div class="grid2">
                <div class="kv"><span>Destination</span><strong>${d.to_code}</strong></div>
                <div class="kv"><span>LR Date</span><strong>${d.lr_date||'—'}</strong></div>
            </div>
        </div>
        <div class="lr-preview-aside">
            ${d.photo_url ? `<div class="lr-thumb-wrapper" onclick="zoomImg('${d.photo_url}')"><img class="lr-thumb" src="${d.photo_url}"><div style="font-size:9px;text-align:center;background:#6c63ff;color:white;padding:2px">ZOOM 🔍</div></div>` : '<div style="font-size:10px;color:#6b7280;padding:15px;border:1px dashed #2e3248;border-radius:8px">No Proof</div>'}
        </div>
    </div>
    <div class="tbl-wrap"><table><thead><tr><th>Invoice No</th><th>Qty</th><th>Modified By</th></tr></thead><tbody>
    ${invs.map(i=>`<tr><td>${i.invoice_no}</td><td>${i.invoice_qty}</td><td>${d.updated_by || 'Original'}</td></tr>`).join('')}</tbody></table></div>
  </div>`;
}

function compress(f){
  return new Promise(res=>{
    const r=new FileReader(); r.readAsDataURL(f);
    r.onload=e=>{
      const i=new Image(); i.src=e.target.result;
      i.onload=()=>{
        const c=document.createElement('canvas');
        const w=800, s=w/i.width; c.width=w; c.height=i.height*s;
        c.getContext('2d').drawImage(i,0,0,c.width,c.height);
        c.toBlob(b=>res(b),'image/jpeg',0.5);
      }
    }
  });
}
</script>
</body>
</html>
