<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TMS — Transport Management</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#0f1117;color:#e8eaf6;min-height:100vh;font-size:15px}
.center{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.card{background:#1a1d27;border:1px solid #2e3248;border-radius:16px;padding:28px;width:100%;max-width:400px}
.page{display:none;max-width:850px;margin:0 auto;padding:16px 16px 100px}
.box{background:#1a1d27;border:1px solid #2e3248;border-radius:12px;padding:16px;margin-bottom:14px}
.box-title{font-size:.72rem;color:#6b7280;text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;font-weight:700}
.topbar{background:#1a1d27;border-bottom:1px solid #2e3248;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:200}
.brand{font-weight:800;color:#6c63ff;font-size:1.1rem}
.tabs{display:flex;gap:4px;background:#22263a;border-radius:10px;padding:4px;margin:14px 0}
.tab{flex:1;padding:8px 4px;text-align:center;border:none;background:transparent;color:#6b7280;font-size:.8rem;font-weight:700;cursor:pointer;border-radius:7px}
.tab.on{background:#6c63ff;color:#fff}
.field{margin-bottom:12px}
.field label{display:block;font-size:.72rem;color:#6b7280;margin-bottom:5px;text-transform:uppercase;font-weight:600}
input,select{width:100%;background:#22263a;border:1px solid #2e3248;color:#e8eaf6;border-radius:8px;padding:10px;font-size:.9rem;outline:none}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border:none;border-radius:8px;font-size:.88rem;font-weight:700;cursor:pointer}
.btn-full{width:100%}.btn-sm{padding:5px 12px;font-size:.76rem}
.btn-purple{background:#6c63ff;color:#fff}.btn-green{background:#10b981;color:#fff}
.btn-gray{background:#22263a;color:#e8eaf6;border:1px solid #2e3248}.btn-red{background:#ef4444;color:#fff}
.btn-teal{background:transparent;color:#00d4aa;border:1px solid #00d4aa}
.srow{display:flex;gap:8px}.srow input{flex:1}
/* LR CARD WITH RIGHT IMAGE */
.lr-card{background:#1a1d27;border:1px solid #2e3248;border-radius:12px;padding:20px;margin-top:10px}
.lr-layout{display:flex;gap:20px;justify-content:space-between;align-items:flex-start}
.lr-details{flex:1}.lr-num{font-size:1.2rem;font-weight:800;color:#00d4aa;font-family:monospace}
.badge{font-size:.7rem;font-weight:800;padding:4px 10px;border-radius:20px}
.lr-preview-aside{width:160px;text-align:right}
.lr-thumb-wrapper{position:relative;display:inline-block;border-radius:8px;overflow:hidden;border:2px solid #2e3248;cursor:zoom-in}
.lr-thumb{width:100%;height:110px;object-fit:cover;display:block}
#zoom-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:2000;align-items:center;justify-content:center;padding:10px;cursor:zoom-out}
#zoom-img{max-width:100%;max-height:95vh;border-radius:8px}
.tbl-wrap{overflow-x:auto;border-radius:10px;border:1px solid #2e3248;margin-top:15px}
table{width:100%;border-collapse:collapse;font-size:.8rem}
th{background:#22263a;padding:10px;text-align:left;color:#6b7280;text-transform:uppercase}
td{padding:10px;border-top:1px solid #2e3248;white-space:nowrap}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(30px);background:#1a1d27;border:1px solid #2e3248;color:#e8eaf6;padding:10px 20px;border-radius:8px;font-size:.83rem;opacity:0;transition:.3s;z-index:9999;text-align:center}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.logout{background:none;border:none;color:#6b7280;cursor:pointer}
</style>
</head>
<body>
<div id="toast" class="toast"></div>
<div id="zoom-overlay" onclick="this.style.display='none'"><img id="zoom-img" src=""></div>

<!-- LOGIN -->
<div id="pg-login" class="center">
    <div class="card">
        <div style="font-size:2rem;font-weight:900;color:#6c63ff;margin-bottom:4px">TMS</div>
        <div style="color:#6b7280;font-size:.83rem;margin-bottom:24px">Supply Chain Management</div>
        <div class="field"><label>Username</label><input id="inp-u" placeholder="Username"/></div>
        <div class="field"><label>Password</label><input id="inp-p" type="password" placeholder="Password"/></div>
        <button class="btn btn-purple btn-full" onclick="doLogin()">Login</button>
    </div>
</div>

<!-- ADMIN PANEL -->
<div id="pg-admin" class="page">
    <div class="topbar"><div><div class="brand">TMS</div><div class="role-tag" id="admin-tag"></div></div><button class="logout" onclick="doLogout()">Logout</button></div>
    
    <div id="super-danger" style="display:none" class="box">
        <div class="box-title" style="color:#ef4444">⚠️ Master Control</div>
        <div style="display:flex; gap:8px"><button class="btn btn-red btn-full" onclick="nuke('lr_master')">Wipe LRs</button><button class="btn btn-red btn-full" onclick="nuke('invoices')">Wipe Invoices</button></div>
    </div>

    <div class="tabs">
        <button class="tab on" id="at-lr" onclick="adminTab('lr')">🔍 LR Search</button>
        <button class="tab" id="at-up" onclick="adminTab('up')">📤 Upload</button>
        <button class="tab" id="at-ms" onclick="adminTab('ms')">📋 Masters</button>
        <button class="tab" id="at-us" onclick="adminTab('us')">👥 Users</button>
    </div>

    <!-- SEARCH TAB -->
    <div id="ap-lr">
        <div class="box"><div class="box-title">Search Shipment</div><div class="srow"><input id="admin-lr" placeholder="LR Number"/><button class="btn btn-gray btn-sm" onclick="doAdminSearch()">Search</button></div></div>
        <div id="admin-result"></div>
        <div id="admin-actions" style="display:none" class="box">
            <div class="box-title">Update Status</div>
            <select id="status-sel" onchange="checkDelivered()" style="margin-bottom:12px">
                <option value="In Transit">In Transit</option><option value="Reached WH">Reached WH</option><option value="Out for Delivery">Out for Delivery</option><option value="Delivered">Delivered</option>
            </select>
            <div id="photo-ui" style="display:none">
                <button class="btn btn-gray btn-full" onclick="$('cam').click()" style="margin-bottom:10px">📷 Scan LR Copy</button>
                <div id="prev-box" style="display:none; text-align:center"><img id="prev-img" style="max-width:100%; border-radius:8px"/></div>
            </div>
            <button class="btn btn-green btn-full" onclick="doUnifiedUpdate()">Save Changes</button>
        </div>
    </div>

    <!-- UPLOAD TAB -->
    <div id="ap-up" style="display:none">
        <div class="box">
            <div class="box-title">Upload LR Data</div>
            <button class="btn btn-teal btn-sm" style="margin-bottom:10px" onclick="dlFormat('lr')">⬇ Download Format</button>
            <input type="file" id="lr-file" accept=".xlsx,.csv" class="field"/>
            <button class="btn btn-green btn-full" onclick="toast('Processing...','ok')">Upload LR Dataset</button>
        </div>
    </div>

    <!-- MASTERS TAB -->
    <div id="ap-ms" style="display:none">
        <div class="box"><div class="box-title">Store Master</div><button class="btn btn-teal btn-sm" style="margin-bottom:10px" onclick="dlFormat('store')">⬇ Download Format</button><button class="btn btn-gray btn-full" onclick="loadStoreMaster()">View Store Master</button><div id="store-view" class="tbl-wrap" style="margin-top:10px"></div></div>
        <div class="box"><div class="box-title">Distance Matrix (SLA)</div><button class="btn btn-teal btn-sm" style="margin-bottom:10px" onclick="dlFormat('dist')">⬇ Download Format</button><button class="btn btn-gray btn-full" onclick="loadDistMatrix()">View Transit SLAs</button><div id="dist-view" class="tbl-wrap" style="margin-top:10px"></div></div>
    </div>

    <!-- USERS TAB -->
    <div id="ap-us" style="display:none">
        <div class="box"><div class="box-title">User Management</div><button class="btn btn-gray btn-full" onclick="loadUsers()">View All Users</button><div id="user-view" class="tbl-wrap" style="margin-top:10px"></div></div>
    </div>
</div>

<input type="file" id="cam" accept="image/*" capture="environment" style="display:none" onchange="handleImg(this)"/>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-storage-compat.js"></script>

<script>
firebase.initializeApp({
    apiKey:"AIzaSyAPu5_BwUEu_xXdpXkmOJbuErGCGYqBUeE",
    authDomain:"wh-logistics-system.firebaseapp.com",
    projectId:"wh-logistics-system",
    storageBucket:"wh-logistics-system.firebasestorage.app",
    messagingSenderId:"279467148642",
    appId:"1:279467148642:web:c458996bca6c85ed33983b"
});
const db=firebase.firestore(), ST=firebase.storage(), TS=()=>firebase.firestore.FieldValue.serverTimestamp(), $=id=>document.getElementById(id);
let CU=null, pBlob=null;

function toast(m,t=''){ const el=$('toast'); el.textContent=m; el.className=`toast on ${t==='ok'?'ok':t==='err'?'err':''}`; setTimeout(()=>el.classList.remove('on'),3000); }

async function doLogin(){
    const u=$('inp-u').value.trim(), p=$('inp-p').value.trim();
    const snap=await db.collection('users').doc(u).get();
    if(snap.exists && snap.data().password===p){
        const d=snap.data(); CU={id:u,...d};
        const isSuper = d.is_super === true || String(d.is_super) === 'true';
        $('admin-tag').textContent=`${isSuper ? '⭐ Super Admin' : 'Admin'} · ${u}`;
        if(isSuper) $('super-danger').style.display='block';
        $('pg-login').style.display='none'; $('pg-admin').style.display='block';
    } else toast('Invalid Credentials','err');
}

function doLogout(){ location.reload(); }

function adminTab(t){
    ['lr','up','ms','us'].forEach(x => { $(`at-${x}`).classList.toggle('on', x===t); $(`ap-${x}`).style.display = x===t ? 'block' : 'none'; });
}

async function doAdminSearch(){
    const lr=$('admin-lr').value.trim().toUpperCase(); if(!lr)return;
    const s=await db.collection('lr_master').doc(lr).get();
    if(!s.exists)return toast('LR Not Found','err');
    const invs=await db.collection('invoices').where('lr_no','==',lr).get();
    $('admin-result').innerHTML=renderLR(lr,s.data(),invs.docs.map(x=>x.data()));
    $('admin-actions').style.display='block'; $('admin-actions').dataset.lr=lr;
    $('status-sel').value=s.data().status||'In Transit'; checkDelivered();
}

function checkDelivered(){ $('photo-ui').style.display=$('status-sel').value==='Delivered'?'block':'none'; }
function zoomImg(url){ $('zoom-img').src=url; $('zoom-overlay').style.display='flex'; }
async function handleImg(inp){ const f=inp.files[0]; if(!f)return; pBlob=await compress(f); $('prev-img').src=URL.createObjectURL(pBlob); $('prev-box').style.display='block'; }

async function doUnifiedUpdate(){
    const lr=$('admin-actions').dataset.lr, st=$('status-sel').value;
    try {
        let up={status:st, last_updated:TS(), updated_by:CU.id};
        if(pBlob){ const ref=ST.ref(`lr_copies/${lr}.jpg`); const snap=await ref.put(pBlob); up.photo_url=await snap.ref.getDownloadURL(); }
        await db.collection('lr_master').doc(lr).update(up); toast('Updated','ok'); doAdminSearch();
    } catch(e){ toast('Error updating','err'); }
}

async function loadStoreMaster(){
    const snap=await db.collection('store_master').get();
    let h='<table><thead><tr><th>Code</th><th>Store Name</th><th>City</th></tr></thead><tbody>';
    snap.forEach(d=>{ const r=d.data(); h+=`<tr><td>${d.id}</td><td>${r.name}</td><td>${r.city}</td></tr>`; });
    $('store-view').innerHTML=h+'</tbody></table>';
}

async function loadDistMatrix(){
    const snap=await db.collection('distance_matrix').get();
    let h='<table><thead><tr><th>WH</th><th>To City</th><th>SLA</th></tr></thead><tbody>';
    snap.forEach(d=>{ const r=d.data(); h+=`<tr><td>${r.from_wh}</td><td>${r.to_city}</td><td>${r.transit_days} Days</td></tr>`; });
    $('dist-view').innerHTML=h+'</tbody></table>';
}

async function loadUsers(){
    const snap=await db.collection('users').get();
    let h='<table><thead><tr><th>User</th><th>Role</th><th>Action</th></tr></thead><tbody>';
    snap.forEach(d=>{ const r=d.data(); h+=`<tr><td>${d.id}</td><td>${r.role}</td><td><button class="btn btn-sm btn-gray" onclick="toast('Toggled','ok')">${r.blocked?'Unblock':'Block'}</button></td></tr>`; });
    $('user-view').innerHTML=h+'</tbody></table>';
}

function dlFormat(type){
    const csvs={lr:'FROM_WH,TO_WH,LR_NO,INVOICE_NO,QTY\n',store:'STORE_CODE,NAME,CITY\n',dist:'FROM_WH,TO_CITY,SLA_DAYS\n',us:'USER,PASS,ROLE\n'};
    const a=document.createElement('a'); a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csvs[type]); a.download=`TMS_${type}_Format.csv`; a.click();
}

async function nuke(col){ if(confirm(`Purge all ${col}?`)){ const s=await db.collection(col).get(); const b=db.batch(); s.forEach(d=>b.delete(d.ref)); await b.commit(); toast('Purged','ok'); } }

function renderLR(lr,d,invs){
    const c=d.status==='Delivered'?'#10b981':'#f59e0b';
    return `<div class="lr-card"><div class="lr-layout"><div class="lr-details">
    <div style="display:flex; justify-content:space-between; margin-bottom:10px"><div class="lr-num">LR: ${lr}</div><span class="badge" style="background:${c}22;color:${c}">${d.status}</span></div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px"><div><span>Store Code</span><br><strong>${d.to_code}</strong></div><div><span>Date</span><br><strong>${d.lr_date||'—'}</strong></div></div></div>
    <div class="lr-preview-aside">${d.photo_url ? `<div class="lr-thumb-wrapper" onclick="zoomImg('${d.photo_url}')"><img class="lr-thumb" src="${d.photo_url}"><div style="font-size:9px;text-align:center;background:#6c63ff;color:white">ZOOM 🔍</div></div>` : '<div style="font-size:10px;color:#6b7280;padding:15px;border:1px dashed #2e3248;border-radius:8px">No Proof</div>'}</div></div>
    <div class="tbl-wrap"><table><thead><tr><th>Invoice</th><th>Qty</th></tr></thead><tbody>${invs.map(i=>`<tr><td>${i.invoice_no}</td><td>${i.invoice_qty}</td></tr>`).join('')}</tbody></table></div></div>`;
}

function compress(f){ return new Promise(res=>{ const r=new FileReader(); r.readAsDataURL(f); r.onload=e=>{ const i=new Image(); i.src=e.target.result; i.onload=()=>{ const c=document.createElement('canvas'); const w=800, s=w/i.width; c.width=w; c.height=i.height*s; c.getContext('2d').drawImage(i,0,0,c.width,c.height); c.toBlob(b=>res(b),'image/jpeg',0.5); } } }); }
</script>
</body>
</html>
