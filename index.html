<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TMS — Enterprise Logistics Hub</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#0f1117;color:#e8eaf6;min-height:100vh;font-size:14px}
.center{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.card{background:#1a1d27;border:1px solid #2e3248;border-radius:16px;padding:28px;width:100%;max-width:400px}
.page{display:none;max-width:950px;margin:0 auto;padding:16px 16px 100px}
.box{background:#1a1d27;border:1px solid #2e3248;border-radius:12px;padding:16px;margin-bottom:14px}
.box-title{font-size:.7rem;color:#6b7280;text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;font-weight:700}
.topbar{background:#1a1d27;border-bottom:1px solid #2e3248;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:200}
.brand{font-weight:800;color:#6c63ff;font-size:1.1rem}
.tabs{display:flex;gap:4px;background:#22263a;border-radius:10px;padding:4px;margin:14px 0}
.tab{flex:1;padding:8px 4px;text-align:center;border:none;background:transparent;color:#6b7280;font-size:.8rem;font-weight:700;cursor:pointer;border-radius:7px}
.tab.on{background:#6c63ff;color:#fff}
.field{margin-bottom:12px}
.field label{display:block;font-size:.65rem;color:#6b7280;margin-bottom:4px;text-transform:uppercase;font-weight:600}
input,select,textarea{width:100%;background:#22263a;border:1px solid #2e3248;color:#e8eaf6;border-radius:8px;padding:10px;font-size:.9rem;outline:none}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border:none;border-radius:8px;font-size:.85rem;font-weight:700;cursor:pointer;transition:0.1s}
.btn:disabled{opacity:0.5;cursor:not-allowed}
.btn-full{width:100%}
.btn-green{background:#10b981;color:#fff}
.btn-purple{background:#6c63ff;color:#fff}
.btn-red{background:#ef4444;color:#fff}
.btn-gray{background:#22263a;color:#e8eaf6;border:1px solid #2e3248}
.btn-teal{background:transparent;color:#00d4aa;border:1px solid #00d4aa}
.srow{display:flex;gap:8px}.srow input{flex:1}
.lr-card{background:#1a1d27;border:1px solid #2e3248;border-radius:12px;padding:20px;margin-top:10px}
.lr-layout{display:flex;gap:20px;justify-content:space-between;align-items:flex-start}
.lr-num{font-size:1.2rem;font-weight:800;color:#00d4aa;font-family:monospace}
.badge{font-size:.65rem;font-weight:800;padding:4px 10px;border-radius:20px}
.lr-preview-aside{width:160px;text-align:right}
.lr-thumb-wrapper{position:relative;display:inline-block;border-radius:8px;overflow:hidden;border:2px solid #2e3248;cursor:zoom-in}
.lr-thumb{width:100%;height:110px;object-fit:cover;display:block}
#zoom-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:2000;align-items:center;justify-content:center;padding:10px;cursor:zoom-out}
#zoom-img{max-width:100%;max-height:95vh;border-radius:8px}
.tbl-wrap{overflow-x:auto;border-radius:10px;border:1px solid #2e3248;margin-top:15px}
table{width:100%;border-collapse:collapse;font-size:.8rem}
th{background:#22263a;padding:10px;text-align:left;color:#6b7280;text-transform:uppercase;font-size:.65rem}
td{padding:10px;border-top:1px solid #2e3248;white-space:nowrap}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(30px);background:#1a1d27;border:1px solid #2e3248;color:#e8eaf6;padding:10px 20px;border-radius:8px;font-size:.8rem;opacity:0;transition:0.3s;z-index:9999;text-align:center}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.logout{background:none;border:none;color:#6b7280;cursor:pointer}
.chip{padding:2px 8px;border-radius:5px;font-size:10px;font-weight:bold;text-transform:uppercase}
.chip-admin{background:#6c63ff22;color:#6c63ff}
.chip-store{background:#3b82f622;color:#3b82f6}
.log{background:#0d1117;border:1px solid #2e3248;border-radius:8px;padding:10px;font-family:monospace;font-size:.7rem;max-height:150px;overflow-y:auto;color:#00d4aa;margin-top:10px;display:none}
</style>
</head>
<body>
<div id="toast" class="toast"></div>
<div id="zoom-overlay" onclick="this.style.display='none'"><img id="zoom-img" src=""></div>

<!-- LOGIN -->
<div id="pg-login" class="center">
  <div class="card">
    <div style="font-size:2.5rem;font-weight:900;color:#6c63ff;margin-bottom:4px">TMS</div>
    <div style="color:#6b7280;font-size:.85rem;margin-bottom:24px">Logistics Hub Control</div>
    <div class="field"><label>Username</label><input id="inp-u" placeholder="Enter username"/></div>
    <div class="field"><label>Password</label><input id="inp-p" type="password" placeholder="Enter password"/></div>
    <button class="btn btn-purple btn-full" onclick="doLogin()">Secure Login</button>
  </div>
</div>

<!-- MAIN PAGE -->
<div id="pg-main" class="page">
  <div class="topbar"><div><div class="brand">TMS</div><div class="role-tag" id="user-tag"></div></div><button class="logout" onclick="doLogout()">Logout</button></div>
  
  <div id="super-admin-tools" style="display:none">
    <div class="box" style="border-color:#ef444466">
      <div class="box-title" style="color:#ef4444">⚠️ MASTER CONTROL & AUDIT LOG</div>
      <div style="display:flex; gap:8px; margin-bottom:12px">
        <button class="btn btn-red" style="flex:1" onclick="nuke('lr_master')">Wipe LRs</button>
        <button class="btn btn-red" style="flex:1" onclick="nuke('invoices')">Wipe Invoices</button>
      </div>
      <button class="btn btn-gray btn-full" onclick="loadAuditLogs()">🔍 Audit Activity History</button>
    </div>
    <div id="audit-log-area" style="display:none" class="box">
        <div id="log-list" style="font-size: 0.75rem; color:#6b7280; max-height:150px; overflow-y:auto"></div>
    </div>
  </div>

  <div id="nav-tabs" class="tabs">
    <button class="tab on" id="tab-lr" onclick="showTab('lr')">🔍 Search</button>
    <button class="tab" id="tab-up" onclick="showTab('up')">📤 Upload</button>
    <button class="tab" id="tab-ms" onclick="showTab('ms')">📋 Masters</button>
    <button class="tab" id="tab-us" onclick="showTab('us')">👥 Users</button>
  </div>

  <div id="sec-lr">
    <div class="box">
      <div class="box-title">Search Shipment</div>
      <div class="srow"><input id="srch-lr" placeholder="Enter LR Number"/><button class="btn btn-gray" onclick="doSearch()">Search</button></div>
    </div>
    <div id="res-area"></div>
    <div id="action-box" style="display:none" class="box">
      <div class="box-title">Record Update</div>
      <select id="status-sel" onchange="checkDelivered()" style="margin-bottom:12px">
        <option value="In Transit">In Transit</option>
        <option value="Reached WH">Reached WH</option>
        <option value="Out for Delivery">Out for Delivery</option>
        <option value="Delivered">Delivered</option>
      </select>
      <div id="photo-ui" style="display:none">
        <div style="display:flex; gap:8px; margin-bottom:10px">
            <button class="btn btn-gray" style="flex:1" onclick="$('cam').click()">📷 Camera</button>
            <button class="btn btn-gray" style="flex:1" onclick="$('gal').click()">🖼 Gallery</button>
        </div>
        <div id="prev-box" style="display:none; text-align:center"><img id="prev-img" style="max-width:100%; border-radius:8px; border:1px solid #10b981"/></div>
      </div>
      <button class="btn btn-green btn-full" id="up-btn" onclick="doUnifiedUpdate()">Update Record</button>
    </div>
  </div>

  <div id="sec-up" style="display:none">
    <div class="box">
      <div class="box-title">Upload Master Data</div>
      <div style="border:2px dashed #2e3248; border-radius:10px; padding:30px; text-align:center; cursor:pointer" onclick="$('xl-file').click()">📁 Select Excel/CSV<input type="file" id="xl-file" style="display:none" onchange="toast('File Ready','ok')"/></div>
      <button class="btn btn-green btn-full" style="margin-top:12px">Upload Now</button>
    </div>
  </div>

  <!-- MASTERS SECTION -->
  <div id="sec-ms" style="display:none">
    <div class="box">
        <div class="box-title">Store Master</div>
        <div id="store-master-view">Loading...</div>
    </div>
    <div class="box">
        <div class="box-title">Distance Matrix</div>
        <div id="dist-view">Loading...</div>
    </div>
  </div>

  <!-- USERS SECTION -->
  <div id="sec-us" style="display:none">
    <div class="box">
        <div class="box-title">System Users</div>
        <div id="user-view">Loading...</div>
    </div>
  </div>
</div>

<input type="file" id="cam" accept="image/*" capture="environment" style="display:none" onchange="handleImg(this)"/>
<input type="file" id="gal" accept="image/*" style="display:none" onchange="handleImg(this)"/>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-storage-compat.js"></script>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyAPu5_BwUEu_xXdpXkmOJbuErGCGYqBUeE",
  authDomain:"wh-logistics-system.firebaseapp.com",
  projectId:"wh-logistics-system",
  storageBucket:"wh-logistics-system.firebasestorage.app",
  messagingSenderId:"279467148642",
  appId:"1:279467148642:web:c458996bca6c85ed33983b"
});
const db=firebase.firestore(), ST=firebase.storage(), TS=()=>firebase.firestore.FieldValue.serverTimestamp();
const $=id=>document.getElementById(id);
let CU=null, pBlob=null;

function toast(m,t=''){
  const el=$('toast'); el.textContent=m; el.className=`toast on ${t==='ok'?'ok':t==='err'?'err':''}`;
  setTimeout(()=>el.classList.remove('on'),3000);
}

async function doLogin(){
  const u=$('inp-u').value.trim(), p=$('inp-p').value.trim();
  const snap=await db.collection('users').doc(u).get();
  if(snap.exists && snap.data().password===p){
    const d = snap.data(); CU={id:u,...d};
    const isSuper = (d.is_super === true || String(d.is_super) === 'true');
    $('user-tag').textContent=`${isSuper ? '⭐ Super Admin' : d.role} · ${u}`;
    if(isSuper) $('super-admin-tools').style.display='block';
    if(isSuper || d.role==='Admin') $('nav-tabs').style.display='flex';
    $('pg-login').style.display='none'; $('pg-main').style.display='block';
  } else toast('Unauthorized Access','err');
}

function doLogout(){ location.reload(); }

function showTab(t){
  ['lr','up','ms','us'].forEach(x => {
      $(`sec-${x}`).style.display = x===t ? 'block' : 'none';
      $(`tab-${x}`).classList.toggle('on', x===t);
  });
  if(t==='ms') { loadStoreMaster(); loadDistMatrix(); }
  if(t==='us') loadUsers();
}

// RESTORED STORE MASTER VIEW
async function loadStoreMaster(){
    const snap = await db.collection('store_master').get();
    let h = '<div class="tbl-wrap"><table><thead><tr><th>Code</th><th>Name</th><th>City</th></tr></thead><tbody>';
    snap.forEach(d => { const r = d.data(); h += `<tr><td>${d.id}</td><td>${r.name}</td><td>${r.city}</td></tr>`; });
    $('store-master-view').innerHTML = h + '</tbody></table></div>';
}

async function loadDistMatrix(){
    const snap = await db.collection('distance_matrix').get();
    let h = '<div class="tbl-wrap"><table><thead><tr><th>WH</th><th>City</th><th>Days</th></tr></thead><tbody>';
    snap.forEach(d => { const r = d.data(); h += `<tr><td>${r.from_wh}</td><td>${r.to_city}</td><td>${r.transit_days}</td></tr>`; });
    $('dist-view').innerHTML = h + '</tbody></table></div>';
}

// RESTORED USER VIEW WITH ADMIN PROTECTION
async function loadUsers(){
    const snap = await db.collection('users').get();
    let h = '<div class="tbl-wrap"><table><thead><tr><th>User</th><th>Role</th><th>Status</th><th>Action</th></tr></thead><tbody>';
    snap.forEach(d => {
        const r = d.data();
        const isProtected = r.role === 'Admin' || r.is_super;
        const actionBtn = (CU.is_super || !isProtected) ? 
            `<button class="btn btn-teal btn-sm" onclick="toggleBlock('${d.id}', ${!r.blocked})">${r.blocked ? 'Unblock' : 'Block'}</button>` : '';
        
        h += `<tr><td>${d.id}</td><td><span class="chip chip-${r.role.toLowerCase()}">${r.role}</span></td>
              <td>${r.blocked ? '❌' : '✅'}</td><td>${actionBtn}</td></tr>`;
    });
    $('user-view').innerHTML = h + '</tbody></table></div>';
}

async function toggleBlock(uid, state){
    await db.collection('users').doc(uid).update({blocked: state});
    toast('User Status Updated','ok'); loadUsers();
}

async function doSearch(){
  const lr=$('srch-lr').value.trim().toUpperCase(); if(!lr)return;
  const s=await db.collection('lr_master').doc(lr).get();
  if(!s.exists)return toast('Not Found','err');
  const d=s.data();
  const invs=await db.collection('invoices').where('lr_no','==',lr).get();
  $('res-area').innerHTML=renderLR(lr,d,invs.docs.map(x=>x.data()));
  if(CU.is_super || CU.role==='Admin' || CU.role==='Transporter'){
    $('action-box').style.display='block'; $('action-box').dataset.lr=lr;
    $('status-sel').value=d.status||'In Transit'; checkDelivered();
  }
}

function checkDelivered(){ $('photo-ui').style.display=$('status-sel').value==='Delivered'?'block':'none'; }
function zoomImg(url){ $('zoom-img').src = url; $('zoom-overlay').style.display = 'flex'; }
async function handleImg(inp){ const f=inp.files[0]; if(!f)return; pBlob=await compress(f); $('prev-img').src=URL.createObjectURL(pBlob); $('prev-box').style.display='block'; }

async function doUnifiedUpdate(){
  const lr=$('action-box').dataset.lr; const st=$('status-sel').value; const btn=$('up-btn');
  btn.disabled=true; btn.textContent='Saving...';
  try {
    let upData = { status:st, last_updated:TS(), updated_by:CU.id };
    if(pBlob){
      const ref=ST.ref(`lr_copies/${lr}_${Date.now()}.jpg`);
      const snap = await ref.put(pBlob); upData.photo_url = await snap.ref.getDownloadURL();
    }
    await db.collection('lr_master').doc(lr).update(upData);
    toast('Updated!','ok'); pBlob=null; $('prev-box').style.display='none'; doSearch();
  } catch(e) { toast('Error','err'); }
  finally { btn.disabled=false; btn.textContent='Update Record'; }
}

async function nuke(col){
  if(!confirm(`⚠️ PURGE ALL ${col}?`)) return;
  const snap = await db.collection(col).get(); const batch = db.batch();
  snap.forEach(d => batch.delete(d.ref)); await batch.commit();
  toast(`${col} Purged`,'ok');
}

function renderLR(lr,d,invs){
  const c=d.status==='Delivered'?'#10b981':'#f59e0b';
  return `<div class="lr-card"><div class="lr-layout"><div class="lr-details">
    <div style="display:flex; justify-content:space-between; margin-bottom:10px"><div class="lr-num">LR: ${lr}</div><span class="badge" style="background:${c}22;color:${c}">${d.status}</span></div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; font-size:0.85rem"><div><span style="color:#6b7280">Store</span><br><strong>${d.to_code}</strong></div><div><span style="color:#6b7280">Date</span><br><strong>${d.lr_date||'—'}</strong></div></div></div>
    <div class="lr-preview-aside">${d.photo_url ? `<div class="lr-thumb-wrapper" onclick="zoomImg('${d.photo_url}')"><img class="lr-thumb" src="${d.photo_url}"><div style="font-size:9px;text-align:center;background:#6c63ff;color:white">ZOOM 🔍</div></div>` : '<div style="font-size:10px;color:#6b7280;padding:15px;border:1px dashed #2e3248;border-radius:8px">No Proof</div>'}</div></div>
    <div class="tbl-wrap"><table><thead><tr><th>Invoice</th><th>Qty</th></tr></thead><tbody>${invs.map(i=>`<tr><td>${i.invoice_no}</td><td>${i.invoice_qty}</td></tr>`).join('')}</tbody></table></div></div>`;
}

function compress(f){
  return new Promise(res=>{
    const r=new FileReader(); r.readAsDataURL(f);
    r.onload=e=>{
      const i=new Image(); i.src=e.target.result;
      i.onload=()=>{
        const c=document.createElement('canvas'); const w=800, s=w/i.width; c.width=w; c.height=i.height*s;
        c.getContext('2d').drawImage(i,0,0,c.width,c.height); c.toBlob(b=>res(b),'image/jpeg',0.5);
      }
    }
  });
}
</script>
</body>
</html>
