<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TMS — Transport Management</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#0f1117;color:#e8eaf6;min-height:100vh;font-size:15px}
.center{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.card{background:#1a1d27;border:1px solid #2e3248;border-radius:16px;padding:28px;width:100%;max-width:400px}
.page{display:none;max-width:780px;margin:0 auto;padding:16px 16px 100px}
.box{background:#1a1d27;border:1px solid #2e3248;border-radius:12px;padding:16px;margin-bottom:14px}
.box-title{font-size:.72rem;color:#6b7280;text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;font-weight:700}
.topbar{background:#1a1d27;border-bottom:1px solid #2e3248;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:200}
.brand{font-weight:800;color:#6c63ff;font-size:1.1rem;letter-spacing:.05em}
.role-tag{font-size:.72rem;color:#6b7280;margin-top:2px}
.tabs{display:flex;gap:4px;background:#22263a;border-radius:10px;padding:4px;margin:14px 0}
.tab{flex:1;padding:8px 4px;text-align:center;border:none;background:transparent;color:#6b7280;font-size:.8rem;font-weight:700;cursor:pointer;border-radius:7px;transition:all .2s;white-space:nowrap}
.tab.on{background:#6c63ff;color:#fff}
.field{margin-bottom:12px}
.field label{display:block;font-size:.72rem;color:#6b7280;margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em;font-weight:600}
input,select,textarea{width:100%;background:#22263a;border:1px solid #2e3248;color:#e8eaf6;border-radius:8px;padding:10px 12px;font-size:.9rem;font-family:inherit;outline:none}
input:focus,select:focus{border-color:#6c63ff}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border:none;border-radius:8px;font-size:.88rem;font-weight:700;cursor:pointer;transition:all .15s}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-full{width:100%}
.btn-sm{padding:5px 12px;font-size:.76rem;border-radius:6px}
.btn-purple{background:#6c63ff;color:#fff}
.btn-green{background:#10b981;color:#fff}
.btn-gray{background:#22263a;color:#e8eaf6;border:1px solid #2e3248}
.btn-teal{background:transparent;color:#00d4aa;border:1px solid #00d4aa}
.btn-red{background:#ef4444;color:#fff}
.srow{display:flex;gap:8px}.srow input{flex:1}
.stats-bar{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.stat-chip{background:#1a1d27;border:1px solid #2e3248;border-radius:10px;padding:10px 16px;flex:1;min-width:120px;text-align:center}
.stat-num{font-size:1.4rem;font-weight:800;font-family:monospace}
.stat-lbl{font-size:.7rem;color:#6b7280;text-transform:uppercase}
.lr-card{background:#1a1d27;border:1px solid #2e3248;border-radius:12px;padding:16px;margin-top:12px}
.lr-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.lr-num{font-size:1.1rem;font-weight:800;color:#00d4aa;font-family:monospace}
.badge{font-size:.7rem;font-weight:800;padding:4px 10px;border-radius:20px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.kv span{font-size:.68rem;color:#6b7280;text-transform:uppercase;display:block}
.kv strong{font-size:.88rem}
.tbl-wrap{overflow-x:auto;border-radius:8px;border:1px solid #2e3248;margin-top:8px}
table{width:100%;border-collapse:collapse;font-size:.78rem}
th{background:#22263a;padding:8px;text-align:left;color:#6b7280;font-size:.68rem}
td{padding:8px;border-top:1px solid #2e3248;white-space:nowrap}
.drop{border:2px dashed #2e3248;border-radius:10px;padding:20px;text-align:center;position:relative;cursor:pointer}
.drop input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}
.log{background:#0d1117;border:1px solid #2e3248;border-radius:8px;padding:10px;font-family:monospace;font-size:.73rem;max-height:150px;overflow-y:auto;color:#00d4aa;margin-top:10px;display:none}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(30px);background:#1a1d27;border:1px solid #2e3248;color:#e8eaf6;padding:10px 20px;border-radius:8px;font-size:.83rem;opacity:0;transition:all .3s;z-index:9999;pointer-events:none}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:#10b981;color:#10b981}
.toast.err{border-color:#ef4444;color:#ef4444}
.receipt-box{background:#10b98115;border:2px solid #10b981;border-radius:10px;padding:14px;text-align:center;margin-top:10px}
.receipt-code{font-family:monospace;font-size:1.3rem;font-weight:800;color:#10b981;letter-spacing:.1em}
.logout{background:none;border:none;color:#6b7280;cursor:pointer;font-size:.8rem}
@media(max-width:500px){.grid2{grid-template-columns:1fr}.stats-bar{flex-direction:column}}
</style>
</head>
<body>
<div id="toast" class="toast"></div>

<!-- LOGIN -->
<div id="pg-login" class="center">
  <div class="card">
    <div style="font-size:2rem;font-weight:900;color:#6c63ff;letter-spacing:.1em;margin-bottom:4px">TMS</div>
    <div style="color:#6b7280;font-size:.83rem;margin-bottom:24px">Transport Management System</div>
    <div class="field"><label>Username</label><input id="inp-u" placeholder="Enter username"/></div>
    <div class="field"><label>Password</label><input id="inp-p" type="password" placeholder="Enter password"/></div>
    <button class="btn btn-purple btn-full" id="btn-login" onclick="doLogin()">Login</button>
    <div id="login-err" style="margin-top:10px;font-size:.8rem;color:#ef4444;text-align:center"></div>
  </div>
</div>

<!-- WH PANEL -->
<div id="pg-wh" class="page">
  <div class="topbar"><div><div class="brand">TMS</div><div class="role-tag" id="wh-tag"></div></div><button class="logout" onclick="doLogout()">Logout</button></div>
  <div class="tabs">
    <button class="tab" id="wt-up" onclick="whTab('up')">📤 Upload</button>
    <button class="tab" id="wt-sr" onclick="whTab('sr')">🔍 Search</button>
    <button class="tab" id="wt-dl" onclick="whTab('dl')">⬇ Download</button>
  </div>
  <div id="wp-up">
    <div id="wh-stats" class="stats-bar"></div>
    <div class="box">
      <div class="box-title">Upload LR Data</div>
      <div class="drop"><input type="file" id="wh-file" accept=".xlsx,.csv"/>📂 Click or drag Excel/CSV here</div>
      <button class="btn btn-green btn-full" id="btn-wh-up" style="margin-top:10px" onclick="doWHUpload()">Upload LR Data</button>
      <div class="log" id="wh-log"></div>
    </div>
  </div>
  <div id="wp-sr" style="display:none">
    <div class="box"><div class="srow"><input id="wh-lr" placeholder="Enter LR Number"/><button class="btn btn-gray btn-sm" onclick="doWHSearch()">Search</button></div></div>
    <div id="wh-result"></div>
  </div>
  <div id="wp-dl" style="display:none">
    <div class="box">
      <div class="field"><label>LR Date From</label><input type="date" id="wh-dl-from"/></div>
      <div class="field"><label>LR Date To</label><input type="date" id="wh-dl-to"/></div>
      <button class="btn btn-teal btn-full" onclick="doWHDownload()">⬇ Download CSV</button>
    </div>
  </div>
</div>

<!-- STORE PANEL -->
<div id="pg-store" class="page">
  <div class="topbar"><div><div class="brand">TMS</div><div class="role-tag" id="store-tag"></div></div><button class="logout" onclick="doLogout()">Logout</button></div>
  <div id="store-overdue-bar"></div>
  <div class="box"><div class="srow"><input id="store-lr" placeholder="Enter LR Number"/><button class="btn btn-gray btn-sm" onclick="doStoreSearch()">Track</button></div></div>
  <div id="store-result"></div>
</div>

<!-- TRANSPORTER PANEL -->
<div id="pg-trans" class="page">
  <div class="topbar"><div><div class="brand">TMS</div><div class="role-tag" id="trans-tag"></div></div><button class="logout" onclick="doLogout()">Logout</button></div>
  <div class="tabs">
    <button class="tab on">🔍 Search & Update</button>
    <button class="tab" onclick="loadTransLRList()">📋 Recent LRs</button>
  </div>
  <div class="box">
    <div class="box-title">Find LR</div>
    <button class="btn btn-gray btn-full" style="margin-bottom:10px" onclick="doOCR()">📷 Scan LR Document (OCR)</button>
    <div class="srow"><input id="trans-lr" placeholder="LR Number"/><button class="btn btn-gray btn-sm" onclick="doTransSearch()">Search</button></div>
  </div>

  <div id="trans-result"></div>

  <!-- CONSOLIDATED ACTION BOX -->
  <div id="trans-actions" style="display:none" class="box">
    <div class="box-title">Update Status & Scan Copy</div>
    <div class="field">
      <label>Current Status</label>
      <select id="trans-status-select" onchange="toggleDeliveryUI()">
        <option value="In Transit">In Transit</option>
        <option value="Reached WH">Reached WH</option>
        <option value="Out for Delivery">Out for Delivery</option>
        <option value="Delivered">Delivered (Scan LR Copy)</option>
      </select>
    </div>
    
    <!-- Delivery UI -->
    <div id="delivery-ui" style="display:none; border-top:1px solid #2e3248; padding-top:12px; margin-top:12px">
      <div style="display:flex; gap:8px; margin-bottom:12px">
        <button class="btn btn-gray" style="flex:1" onclick="triggerCamera()">📷 Take Photo</button>
        <button class="btn btn-gray" style="flex:1" onclick="triggerGallery()">🖼 Gallery</button>
      </div>
      <div id="photo-preview-box" style="display:none; text-align:center; margin-bottom:12px">
        <img id="trans-preview-img" style="max-width:100%; max-height:250px; border-radius:8px; border:1px solid #10b981"/>
        <div id="photo-info" style="font-size:.7rem; color:#10b981; margin-top:4px"></div>
      </div>
      <input type="file" id="hidden-cam" accept="image/*" capture="environment" style="display:none" onchange="handleFile(this)"/>
      <input type="file" id="hidden-gal" accept="image/*" style="display:none" onchange="handleFile(this)"/>
    </div>

    <button class="btn btn-green btn-full" id="btn-unified-up" onclick="doUnifiedUpdate()">✅ Confirm Update</button>
  </div>
  <div id="trans-lr-list"></div>
</div>

<!-- ADMIN PANEL -->
<div id="pg-admin" class="page">
  <div class="topbar"><div><div class="brand">TMS</div><div class="role-tag" id="admin-tag"></div></div><button class="logout" onclick="doLogout()">Logout</button></div>
  <div class="tabs">
    <button class="tab on" onclick="adminTab('lr')">🔍 LR</button>
    <button class="tab" onclick="adminTab('up')">📤 Upload</button>
    <button class="tab" onclick="adminTab('users')">👥 Users</button>
  </div>
  <div id="ap-lr">
    <div id="admin-stats" class="stats-bar"></div>
    <div class="box"><div class="srow"><input id="admin-lr" placeholder="LR Number"/><button class="btn btn-gray btn-sm" onclick="doAdminSearch()">Search</button></div></div>
    <div id="admin-result"></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-storage-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyAPu5_BwUEu_xXdpXkmOJbuErGCGYqBUeE",
  authDomain:"wh-logistics-system.firebaseapp.com",
  projectId:"wh-logistics-system",
  storageBucket:"wh-logistics-system.firebasestorage.app",
  messagingSenderId:"279467148642",
  appId:"1:279467148642:web:c458996bca6c85ed33983b"
});
const db=firebase.firestore(), ST=firebase.storage(), TS=()=>firebase.firestore.FieldValue.serverTimestamp();

let CU=null, STORE_MASTER={}, pendingBlob=null;
const $=id=>document.getElementById(id);

function toast(msg,type=''){
  const t=$('toast'); t.textContent=msg; t.className='toast on '+(type==='ok'?'ok':type==='err'?'err':'');
  setTimeout(()=>t.classList.remove('on'),3500);
}

function showPage(id){
  ['pg-login','pg-wh','pg-store','pg-trans','pg-admin'].forEach(p=>$(p).style.display=p===id?(p==='pg-login'?'flex':'block'):'none');
}

async function loadMasters(){
  const ss=await db.collection('store_master').get();
  ss.forEach(d=>STORE_MASTER[d.id]=d.data());
}

// LOGIN & LOGOUT
async function doLogin(){
  const u=$('inp-u').value.trim(), p=$('inp-p').value.trim();
  if(!u||!p)return toast('Enter credentials','err');
  const snap=await db.collection('users').doc(u).get();
  if(!snap.exists||snap.data().password!==p)return toast('Invalid login','err');
  CU={username:u,...snap.data()};
  await loadMasters();
  goRole();
}

function doLogout(){ CU=null; showPage('pg-login'); }

function goRole(){
  const r=CU.role;
  if(r==='WH'){ showPage('pg-wh'); $('wh-tag').textContent=`WH · ${CU.username}`; loadWHStats(); }
  else if(r==='Store'){ showPage('pg-store'); $('store-tag').textContent=`Store · ${CU.store_code}`; }
  else if(r==='Transporter'){ showPage('pg-trans'); $('trans-tag').textContent=`Transporter · ${CU.username}`; }
  else if(r==='Admin'){ showPage('pg-admin'); $('admin-tag').textContent=`Admin · ${CU.username}`; loadAdminStats(); }
}

// TRANSPORTER LOGIC (THE REQUESTED ADVANCEMENT)
function toggleDeliveryUI(){
  $('delivery-ui').style.display=$('trans-status-select').value==='Delivered'?'block':'none';
}

function triggerCamera(){ $('hidden-cam').click(); }
function triggerGallery(){ $('hidden-gal').click(); }

async function handleFile(input){
  const file=input.files[0]; if(!file)return;
  toast("Compressing photo...");
  pendingBlob=await compressImg(file, 900, 0.7);
  $('trans-preview-img').src=URL.createObjectURL(pendingBlob);
  $('photo-preview-box').style.display='block';
  $('photo-info').textContent=`Optimized Size: ${Math.round(pendingBlob.size/1024)}KB`;
}

async function doTransSearch(){
  const lr=$('trans-lr').value.trim().toUpperCase();
  if(!lr)return toast("Enter LR No","err");
  const s=await db.collection('lr_master').doc(lr).get();
  if(!s.exists)return toast("LR Not Found","err");
  const d=s.data();
  const invs=await db.collection('invoices').where('lr_no','==',lr).get();
  $('trans-result').innerHTML=lrCard(lr,d,invs.docs.map(x=>x.data()));
  $('trans-actions').style.display='block';
  $('trans-actions').dataset.lr=lr;
  $('trans-status-select').value=d.status||'In Transit';
  toggleDeliveryUI();
}

async function doUnifiedUpdate(){
  const lr=$('trans-actions').dataset.lr;
  const status=$('trans-status-select').value;
  if(status==='Delivered'&&!pendingBlob)return toast("LR Copy Scan Required for Delivery","err");
  
  const btn=$('btn-unified-up'); btn.disabled=true; btn.textContent="Updating...";
  try{
    let up={ status, last_updated:TS(), updated_by:CU.username };
    if(pendingBlob){
      const ref=ST.ref(`lr_copies/${lr}_${Date.now()}.jpg`);
      await ref.put(pendingBlob);
      up.photo_url=await ref.getDownloadURL();
      up.photo_uploaded_at=TS();
    }
    await db.collection('lr_master').doc(lr).update(up);
    toast("LR Updated Successfully","ok");
    pendingBlob=null; $('photo-preview-box').style.display='none';
    doTransSearch();
  }catch(e){ toast(e.message,"err"); }
  btn.disabled=false; btn.textContent="✅ Confirm Update";
}

// RENDER LR CARD (UNIVERSAL VIEW)
function lrCard(lr,d,invs){
  const c=d.status==='Delivered'?'#10b981':d.status==='In Transit'?'#f59e0b':'#3b82f6';
  return `<div class="lr-card">
    <div class="lr-head">
      <div><div class="lr-num">${lr}</div><div style="font-size:.75rem;color:#6b7280">${d.transporter||''}</div></div>
      <span class="badge" style="background:${c}22;color:${c}">${d.status}</span>
    </div>
    <div class="grid2">
      <div class="kv"><span>Store</span><strong>${d.to_code}</strong></div>
      <div class="kv"><span>LR Date</span><strong>${d.lr_date||'—'}</strong></div>
    </div>
    ${d.photo_url?`<div style="margin-top:10px"><div class="box-title">LR Copy Proof</div>
      <a href="${d.photo_url}" target="_blank"><img src="${d.photo_url}" style="width:100%; border-radius:8px; border:1px solid #2e3248"/></a>
    </div>`:''}
    <div class="tbl-wrap">
      <table><thead><tr><th>Invoice</th><th>Order</th><th>Qty</th></tr></thead>
      <tbody>${invs.map(i=>`<tr><td>${i.invoice_no}</td><td>${i.order_no}</td><td>${i.invoice_qty}</td></tr>`).join('')}</tbody>
      </table>
    </div>
  </div>`;
}

// UTILS: IMAGE COMPRESSION
function compressImg(file,maxW,q){
  return new Promise(res=>{
    const img=new Image(); img.src=URL.createObjectURL(file);
    img.onload=()=>{
      let w=img.width, h=img.height; if(w>maxW){ h=Math.round(h*maxW/w); w=maxW; }
      const c=document.createElement('canvas'); c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      c.toBlob(b=>res(b),'image/jpeg',q);
    }
  });
}

// Placeholder for other functions to avoid breakage
function whTab(t){['up','sr','dl'].forEach(x=>{$(`wp-${x}`).style.display=x===t?'block':'none';});}
async function loadWHStats(){ $('wh-stats').innerHTML='<div class="stat-chip">Loading Stats...</div>'; }
async function loadAdminStats(){ $('admin-stats').innerHTML='<div class="stat-chip">Loading Stats...</div>'; }
function adminTab(t){ toast("Tab switched to "+t); }

showPage('pg-login');
</script>
</body>
</html>
