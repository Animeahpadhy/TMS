<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TMS — Transport Management</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#0f1117;color:#e8eaf6;min-height:100vh;font-size:14px}
.center{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.card{background:#1a1d27;border:1px solid #2e3248;border-radius:16px;padding:28px;width:100%;max-width:400px}
.page{display:none;max-width:780px;margin:0 auto;padding:12px 12px 100px}
.box{background:#1a1d27;border:1px solid #2e3248;border-radius:12px;padding:16px;margin-bottom:14px}
.box-title{font-size:.7rem;color:#6b7280;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;font-weight:700}
.topbar{background:#1a1d27;border-bottom:1px solid #2e3248;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:200}
.brand{font-weight:800;color:#6c63ff;font-size:1.1rem}
.field{margin-bottom:12px}
.field label{display:block;font-size:.65rem;color:#6b7280;margin-bottom:4px;text-transform:uppercase;font-weight:600}
input,select{width:100%;background:#22263a;border:1px solid #2e3248;color:#e8eaf6;border-radius:8px;padding:10px;font-size:.9rem;outline:none}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px;border:none;border-radius:8px;font-size:.85rem;font-weight:700;cursor:pointer;transition:0.1s}
.btn:disabled{opacity:0.5;cursor:not-allowed}
.btn-full{width:100%}
.btn-green{background:#10b981;color:#fff}
.btn-purple{background:#6c63ff;color:#fff}
.btn-gray{background:#22263a;color:#e8eaf6;border:1px solid #2e3248}
.srow{display:flex;gap:8px}.srow input{flex:1}
.lr-card{background:#1a1d27;border:1px solid #2e3248;border-radius:12px;padding:16px;margin-top:10px}
.lr-num{font-size:1.1rem;font-weight:800;color:#00d4aa;font-family:monospace}
.badge{font-size:.65rem;font-weight:800;padding:4px 10px;border-radius:20px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.kv span{font-size:.65rem;color:#6b7280;text-transform:uppercase;display:block}
.kv strong{font-size:.85rem}
.tbl-wrap{overflow-x:auto;border-radius:8px;border:1px solid #2e3248;margin-top:10px}
table{width:100%;border-collapse:collapse;font-size:.75rem}
th{background:#22263a;padding:8px;text-align:left;color:#6b7280}
td{padding:8px;border-top:1px solid #2e3248;white-space:nowrap}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(30px);background:#1a1d27;border:1px solid #2e3248;color:#e8eaf6;padding:10px 20px;border-radius:8px;font-size:.8rem;opacity:0;transition:0.3s;z-index:9999}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:#10b981;color:#10b981}
.toast.err{border-color:#ef4444;color:#ef4444}
.logout{background:none;border:none;color:#6b7280;cursor:pointer}
</style>
</head>
<body>
<div id="toast" class="toast"></div>

<!-- LOGIN PAGE -->
<div id="pg-login" class="center">
  <div class="card">
    <div style="font-size:2rem;font-weight:900;color:#6c63ff;margin-bottom:4px">TMS</div>
    <div style="color:#6b7280;font-size:.8rem;margin-bottom:24px">Supply Chain Management</div>
    <div class="field"><label>Username</label><input id="inp-u" placeholder="Enter username"/></div>
    <div class="field"><label>Password</label><input id="inp-p" type="password" placeholder="Enter password"/></div>
    <button class="btn btn-purple btn-full" id="btn-login" onclick="doLogin()">Login</button>
  </div>
</div>

<!-- MAIN PAGE -->
<div id="pg-main" class="page">
  <div class="topbar"><div><div class="brand">TMS</div><div class="role-tag" id="user-tag"></div></div><button class="logout" onclick="doLogout()">Logout</button></div>
  
  <div class="box">
    <div class="box-title">Search Shipment</div>
    <div class="srow"><input id="srch-lr" placeholder="LR Number"/><button class="btn btn-gray" onclick="doSearch()">Search</button></div>
  </div>

  <div id="res-area"></div>

  <!-- UPDATE SECTION -->
  <div id="trans-box" style="display:none" class="box">
    <div class="box-title">Transporter Update</div>
    <select id="status-sel" onchange="checkDelivered()" style="margin-bottom:12px">
      <option value="In Transit">In Transit</option>
      <option value="Reached WH">Reached WH</option>
      <option value="Out for Delivery">Out for Delivery</option>
      <option value="Delivered">Delivered (Scan LR Copy)</option>
    </select>
    
    <div id="photo-ui" style="display:none">
      <div style="display:flex; gap:8px; margin-bottom:10px">
        <button class="btn btn-gray" style="flex:1" onclick="$('cam').click()">📷 Take Photo</button>
        <button class="btn btn-gray" style="flex:1" onclick="$('gal').click()">🖼 Gallery</button>
      </div>
      <div id="prev-box" style="display:none; text-align:center; margin-bottom:10px">
        <img id="prev-img" style="max-width:100%; border-radius:8px; border:1px solid #10b981"/>
        <div id="img-size" style="font-size:.7rem; color:#10b981; margin-top:4px; font-weight:bold"></div>
      </div>
    </div>

    <button class="btn btn-green btn-full" id="up-btn" onclick="doUnifiedUpdate()">Confirm Update</button>
  </div>
</div>

<input type="file" id="cam" accept="image/*" capture="environment" style="display:none" onchange="handleImg(this)"/>
<input type="file" id="gal" accept="image/*" style="display:none" onchange="handleImg(this)"/>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-storage-compat.js"></script>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyAPu5_BwUEu_xXdpXkmOJbuErGCGYqBUeE",
  authDomain:"wh-logistics-system.firebaseapp.com",
  projectId:"wh-logistics-system",
  storageBucket:"wh-logistics-system.firebasestorage.app",
  messagingSenderId:"279467148642",
  appId:"1:279467148642:web:c458996bca6c85ed33983b"
});
const db=firebase.firestore(), ST=firebase.storage(), TS=()=>firebase.firestore.FieldValue.serverTimestamp();
const $=id=>document.getElementById(id);
let CU=null, pBlob=null;

function toast(m,t=''){
  const el=$('toast'); el.textContent=m; el.className=`toast on ${t==='ok'?'ok':t==='err'?'err':''}`;
  setTimeout(()=>el.classList.remove('on'),3000);
}

async function doLogin(){
  const u=$('inp-u').value.trim(), p=$('inp-p').value.trim();
  const snap=await db.collection('users').doc(u).get();
  if(snap.exists && snap.data().password===p){
    CU={id:u,...snap.data()}; $('user-tag').textContent=CU.id;
    $('pg-login').style.display='none'; $('pg-main').style.display='block';
  } else toast('Invalid Login','err');
}

function doLogout(){ location.reload(); }

async function doSearch(){
  const lr=$('srch-lr').value.trim().toUpperCase();
  if(!lr)return;
  const s=await db.collection('lr_master').doc(lr).get();
  if(!s.exists)return toast('Not Found','err');
  const d=s.data();
  const invs=await db.collection('invoices').where('lr_no','==',lr).get();
  
  $('res-area').innerHTML=renderLR(lr,d,invs.docs.map(x=>x.data()));
  if(CU.role==='Transporter'){
    $('trans-box').style.display='block';
    $('trans-box').dataset.lr=lr;
    $('status-sel').value=d.status||'In Transit';
    checkDelivered();
  }
}

function checkDelivered(){
  $('photo-ui').style.display=$('status-sel').value==='Delivered'?'block':'none';
}

async function handleImg(inp){
  const f=inp.files[0]; if(!f)return;
  toast('Optimizing image...');
  pBlob=await compress(f);
  $('prev-img').src=URL.createObjectURL(pBlob);
  $('prev-box').style.display='block';
  $('img-size').textContent=`Optimized: ${Math.round(pBlob.size/1024)}KB`;
}

// THE FASTER UNIFIED UPDATE
async function doUnifiedUpdate(){
  const lr=$('trans-box').dataset.lr;
  const st=$('status-sel').value;
  const btn=$('up-btn');

  if(st==='Delivered' && !pBlob) return toast('Image Required','err');

  // 1. UI LOCK
  btn.disabled=true; 
  btn.textContent='Updating...';

  // 2. SAFETY TIMEOUT (Force reset if Firebase hangs)
  const timeoutId = setTimeout(() => {
    btn.disabled=false;
    btn.textContent='Confirm Update';
    toast('Network Hang - Please Retry','err');
  }, 12000);

  try {
    let upData = { status:st, last_updated:TS(), updated_by:CU.id };
    
    // 3. PARALLEL EXECUTION
    const tasks = [];
    
    if(pBlob){
      const ref=ST.ref(`lr_copies/${lr}_${Date.now()}.jpg`);
      const uploadTask = ref.put(pBlob).then(async (snap) => {
          upData.photo_url = await snap.ref.getDownloadURL();
      });
      tasks.push(uploadTask);
    }

    // Wait for upload then update Firestore
    await Promise.all(tasks);
    await db.collection('lr_master').doc(lr).update(upData);
    
    clearTimeout(timeoutId);
    toast('Success','ok');
    pBlob=null; 
    $('prev-box').style.display='none';
    await doSearch(); // Confirm visibility instantly
    
  } catch(e) {
    clearTimeout(timeoutId);
    console.error(e);
    toast('Update failed - Check connection','err');
  } finally {
    btn.disabled=false;
    btn.textContent='Confirm Update';
  }
}

function renderLR(lr,d,invs){
  const c=d.status==='Delivered'?'#10b981':'#f59e0b';
  return `<div class="lr-card">
    <div class="lr-head"><div class="lr-num">${lr}</div><span class="badge" style="background:${c}22;color:${c}">${d.status}</span></div>
    <div class="grid2"><div class="kv"><span>Store</span><strong>${d.to_code}</strong></div><div class="kv"><span>Date</span><strong>${d.lr_date||'—'}</strong></div></div>
    ${d.photo_url?`<div style="margin-top:10px"><img src="${d.photo_url}" style="width:100%;border-radius:8px;border:1px solid #2e3248"/></div>`:''}
    <div class="tbl-wrap"><table><thead><tr><th>Invoice</th><th>Qty</th></tr></thead><tbody>
    ${invs.map(i=>`<tr><td>${i.invoice_no}</td><td>${i.invoice_qty}</td></tr>`).join('')}</tbody></table></div>
  </div>`;
}

function compress(f){
  return new Promise(res=>{
    const reader=new FileReader(); reader.readAsDataURL(f);
    reader.onload=e=>{
      const i=new Image(); i.src=e.target.result;
      i.onload=()=>{
        const c=document.createElement('canvas');
        const w=800, scale=w/i.width; c.width=w; c.height=i.height*scale;
        c.getContext('2d').drawImage(i,0,0,c.width,c.height);
        c.toBlob(b=>res(b),'image/jpeg',0.6);
      }
    }
  });
}
</script>
</body>
</html>
