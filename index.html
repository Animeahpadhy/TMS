<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TMS — Transport Management System</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#0f1117;color:#e8eaf6;min-height:100vh;font-size:14px}
.center{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.card{background:#1a1d27;border:1px solid #2e3248;border-radius:16px;padding:28px;width:100%;max-width:400px}
.page{display:none;max-width:1100px;margin:0 auto;padding:16px 16px 100px}
.box{background:#1a1d27;border:1px solid #2e3248;border-radius:12px;padding:16px;margin-bottom:14px}
.box-title{font-size:.72rem;color:#6b7280;text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;font-weight:700}
.topbar{background:#1a1d27;border-bottom:1px solid #2e3248;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:200}
.brand{font-weight:800;color:#6c63ff;font-size:1.1rem}
.tabs{display:flex;gap:4px;background:#22263a;border-radius:10px;padding:4px;margin:14px 0}
.tab{flex:1;padding:8px 4px;text-align:center;border:none;background:transparent;color:#6b7280;font-size:.8rem;font-weight:700;cursor:pointer;border-radius:7px}
.tab.on{background:#6c63ff;color:#fff}
input,select{width:100%;background:#22263a;border:1px solid #2e3248;color:#e8eaf6;border-radius:8px;padding:10px;font-size:.9rem;outline:none}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border:none;border-radius:8px;font-size:.88rem;font-weight:700;cursor:pointer}
.btn-full{width:100%}.btn-green{background:#10b981;color:#fff}.btn-purple{background:#6c63ff;color:#fff}.btn-gray{background:#22263a;color:#e8eaf6;border:1px solid #2e3248}

/* SPLIT LAYOUT FOR SEARCH RESULT */
.lr-card{background:#1a1d27;border:1px solid #2e3248;border-radius:12px;padding:20px;margin-top:10px}
.lr-flex{display:flex;gap:20px;justify-content:space-between;align-items:flex-start}
.lr-details{flex:1}.lr-num{font-size:1.2rem;font-weight:800;color:#00d4aa;font-family:monospace}
.badge{font-size:.7rem;font-weight:800;padding:4px 10px;border-radius:20px;text-transform:uppercase}

/* GRID FOR KEY SHIPMENT DATA */
.data-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(140px, 1fr));gap:15px;margin:20px 0}
.kv-item label{display:block;font-size:10px;color:#6b7280;text-transform:uppercase;font-weight:600;margin-bottom:2px}
.kv-item b{display:block;font-size:13px;color:#e8eaf6}

.lr-preview{width:180px;text-align:right}
.lr-thumb-wrap{border:2px solid #2e3248;border-radius:10px;overflow:hidden;cursor:zoom-in;background:#000}
.lr-thumb{width:100%;height:120px;object-fit:cover;display:block}
.zoom-btn{background:#6c63ff;color:#fff;font-size:9px;font-weight:800;padding:4px;text-align:center}

#zoom-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:2000;align-items:center;justify-content:center;cursor:zoom-out}
#zoom-img{max-width:95%;max-height:95vh;border-radius:8px}

.tbl-wrap{overflow-x:auto;border-radius:8px;border:1px solid #2e3248;margin-top:10px}
table{width:100%;border-collapse:collapse;font-size:.75rem}
th{background:#22263a;padding:10px;text-align:left;color:#6b7280;text-transform:uppercase}
td{padding:10px;border-top:1px solid #2e3248;white-space:nowrap}
.row-total{background:#22263a;font-weight:bold}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(30px);background:#1a1d27;border:1px solid #2e3248;color:#e8eaf6;padding:10px 20px;border-radius:8px;font-size:.83rem;opacity:0;transition:.3s;z-index:9999;text-align:center}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="toast" class="toast"></div>
<div id="zoom-overlay" onclick="this.style.display='none'"><img id="zoom-img" src=""></div>

<!-- LOGIN -->
<div id="pg-login" class="center">
  <div class="card">
    <div style="font-size:2.5rem;font-weight:900;color:#6c63ff;margin-bottom:4px">TMS</div>
    <div style="color:#6b7280;font-size:.85rem;margin-bottom:24px">Supply Chain Control</div>
    <input id="inp-u" placeholder="Username" style="margin-bottom:12px"/>
    <input id="inp-p" type="password" placeholder="Password" style="margin-bottom:20px"/>
    <button class="btn btn-purple btn-full" onclick="doLogin()">Secure Login</button>
  </div>
</div>

<!-- MAIN PAGE -->
<div id="pg-main" class="page">
  <div class="topbar"><div><div class="brand">TMS</div><div class="role-tag" id="user-tag"></div></div><button style="background:none; border:none; color:#6b7280; cursor:pointer" onclick="location.reload()">Logout</button></div>
  
  <div class="tabs">
    <button class="tab on" id="t-lr" onclick="showTab('lr')">🔍 Search</button>
    <button class="tab" id="t-up" onclick="showTab('up')">📤 Upload</button>
    <button class="tab" id="t-ms" onclick="showTab('ms')">📋 Masters</button>
    <button class="tab" id="t-us" onclick="showTab('us')">👥 Users</button>
  </div>

  <div id="sec-lr">
    <div class="box"><div class="box-title">Search Shipment</div><div style="display:flex; gap:8px"><input id="srch-lr" placeholder="Enter LR Number"/><button class="btn btn-gray" onclick="doSearch()">Search</button></div></div>
    <div id="res-area"></div>
    
    <!-- RECORD UPDATE AREA -->
    <div id="action-box" style="display:none" class="box">
        <div class="box-title">Record Update</div>
        <select id="status-sel" onchange="checkDelv()" class="field" style="margin-bottom:15px"><option value="In Transit">In Transit</option><option value="Reached WH">Reached WH</option><option value="Out for Delivery">Out for Delivery</option><option value="Delivered">Delivered</option></select>
        <div id="photo-ui" style="display:none">
            <div style="display:flex; gap:8px; margin-bottom:10px"><button class="btn btn-gray" style="flex:1" onclick="$('cam').click()">📷 Camera</button><button class="btn btn-gray" style="flex:1" onclick="$('gal').click()">🖼 Gallery</button></div>
            <div id="prev-box" style="display:none; text-align:center; margin-bottom:15px"><img id="prev-img" style="max-width:100%; border-radius:8px; border:1px solid #10b981"/></div>
        </div>
        <button class="btn btn-green btn-full" onclick="doUnifiedUpdate()">Update Record</button>
    </div>
  </div>
</div>

<input type="file" id="cam" accept="image/*" capture="environment" style="display:none" onchange="handleImg(this)"/>
<input type="file" id="gal" accept="image/*" style="display:none" onchange="handleImg(this)"/>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-storage-compat.js"></script>

<script>
firebase.initializeApp({
    apiKey:"AIzaSyAPu5_BwUEu_xXdpXkmOJbuErGCGYqBUeE",
    authDomain:"wh-logistics-system.firebaseapp.com",
    projectId:"wh-logistics-system",
    storageBucket:"wh-logistics-system.firebasestorage.app",
    messagingSenderId:"279467148642",
    appId:"1:279467148642:web:c458996bca6c85ed33983b"
});
const db=firebase.firestore(), ST=firebase.storage(), TS=()=>firebase.firestore.FieldValue.serverTimestamp(), $=id=>document.getElementById(id);
let CU=null, pBlob=null, STORE_MASTER={}, WH_MASTER={};

function toast(m){ const el=$('toast'); el.textContent=m; el.classList.add('on'); setTimeout(()=>el.classList.remove('on'),3000); }

async function doLogin(){
    const u=$('inp-u').value.trim(), p=$('inp-p').value.trim();
    const snap=await db.collection('users').doc(u).get();
    if(snap.exists && snap.data().password===p){
        CU={id:u,...snap.data()};
        await loadMasters();
        $('pg-login').style.display='none'; $('pg-main').style.display='block';
    } else alert('Unauthorized');
}

async function loadMasters(){
    const s = await db.collection('store_master').get();
    s.forEach(d=>STORE_MASTER[d.id]=d.data());
    // Assume Warehouse names are stored in a similar collection or logic
}

function showTab(t){ ['lr','up','ms','us'].forEach(x=>{ $(`t-${x}`).classList.toggle('on',x===t); }); }

async function doSearch(){
    const lr=$('srch-lr').value.trim().toUpperCase(); if(!lr) return;
    const s=await db.collection('lr_master').doc(lr).get();
    if(!s.exists) return toast('LR Not Found');
    const d=s.data(), invs=await db.collection('invoices').where('lr_no','==',lr).get();
    const invData = invs.docs.map(x=>x.data());
    
    // SMART DELIVERY DATE CALCULATION
    let delDate = '—';
    if(d.status === 'Delivered' || d.status === 'Store Confirmed'){
        const tTs = d.photo_uploaded_at?.toDate ? d.photo_uploaded_at.toDate() : Infinity;
        const sTs = d.confirmed_time?.toDate ? d.confirmed_time.toDate() : Infinity;
        const earlier = new Date(Math.min(tTs, sTs));
        if(earlier != Infinity) delDate = earlier.toLocaleDateString('en-IN') + ' ' + earlier.toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit'});
    }

    $('res-area').innerHTML=renderLR(lr,d,invData,delDate);
    
    if(CU.role==='Admin' || CU.role==='Transporter' || CU.is_super){
        $('action-box').style.display='block'; $('action-box').dataset.lr=lr;
        $('status-sel').value=d.status||'In Transit'; checkDelv();
    }
}

function checkDelv(){ $('photo-ui').style.display=$('status-sel').value==='Delivered'?'block':'none'; }
function zoomImg(url){ $('zoom-img').src=url; $('zoom-overlay').style.display='flex'; }
async function handleImg(inp){ const f=inp.files[0]; if(!f)return; pBlob=await compress(f); $('prev-img').src=URL.createObjectURL(pBlob); $('prev-box').style.display='block'; }

async function doUnifiedUpdate(){
    const lr=$('action-box').dataset.lr, st=$('status-sel').value;
    try {
        let up={status:st, last_updated:TS(), updated_by:CU.id};
        if(pBlob){ const ref=ST.ref(`lr_copies/${lr}.jpg`); const snap=await ref.put(pBlob); up.photo_url=await snap.ref.getDownloadURL(); up.photo_uploaded_at=TS(); }
        await db.collection('lr_master').doc(lr).update(up); toast('Success'); doSearch();
    } catch(e){ toast('Error'); }
}

function renderLR(lr,d,invs,delDate){
    const c=d.status==='Delivered'?'#10b981':'#f59e0b';
    const store = STORE_MASTER[d.to_code] || {name: d.to_code || '—'};
    const totalBoxes = invs.reduce((a,i)=>a+(parseInt(i.box_count)||0),0);
    const totalQty = invs.reduce((a,i)=>a+(i.invoice_qty||0),0);

    return `<div class="lr-card">
    <div class="lr-flex">
        <div class="lr-details">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px">
                <div class="lr-num">LR: ${lr}</div><span class="badge" style="background:${c}22;color:${c}">${d.status}</span>
            </div>
            
            <div class="data-grid">
                <div class="kv-item"><label>Store Name</label><b>${store.name}</b></div>
                <div class="kv-item"><label>From WH</label><b>${d.from_code || '—'}</b></div>
                <div class="kv-item"><label>LR Date</label><b>${d.lr_date || '—'}</b></div>
                <div class="kv-item"><label>Delivery Date</label><b>${delDate}</b></div>
                <div class="kv-item"><label>No. of Invoices</label><b>${invs.length}</b></div>
                <div class="kv-item"><label>Total Boxes</label><b>${totalBoxes}</b></div>
            </div>
        </div>
        
        <div class="lr-preview">
            ${d.photo_url ? `
            <div class="lr-thumb-wrap" onclick="zoomImg('${d.photo_url}')">
                <img class="lr-thumb" src="${d.photo_url}">
                <div class="zoom-btn">ZOOM 🔍</div>
            </div>` : '<div style="font-size:10px; color:#6b7280; padding:40px; border:1px dashed #444; border-radius:10px; text-align:center">No Photo Proof</div>'}
        </div>
    </div>
    
    <div class="tbl-wrap">
        <table>
            <thead><tr><th>Invoice</th><th>Order</th><th>Qty</th><th>Boxes</th></tr></thead>
            <tbody>
                ${invs.map(i=>`<tr><td>${i.invoice_no}</td><td>${i.order_no || '—'}</td><td>${i.invoice_qty}</td><td>${i.box_count || 0}</td></tr>`).join('')}
                <tr class="row-total"><td colspan="2">TOTAL</td><td>${totalQty}</td><td>${totalBoxes}</td></tr>
            </tbody>
        </table>
    </div></div>`;
}

function compress(f){ return new Promise(res=>{ const r=new FileReader(); r.readAsDataURL(f); r.onload=e=>{ const i=new Image(); i.src=e.target.result; i.onload=()=>{ const c=document.createElement('canvas'); const w=800, s=w/i.width; c.width=w; c.height=i.height*s; c.getContext('2d').drawImage(i,0,0,c.width,c.height); c.toBlob(b=>res(b),'image/jpeg',0.6); } } }); }
</script>
</body>
</html>
