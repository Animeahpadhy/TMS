<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TMS — Transport Management</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#0f1117;color:#e8eaf6;min-height:100vh;font-size:14px}
.center{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.card{background:#1a1d27;border:1px solid #2e3248;border-radius:16px;padding:28px;width:100%;max-width:400px}
.page{display:none;max-width:780px;margin:0 auto;padding:12px 12px 100px}
.box{background:#1a1d27;border:1px solid #2e3248;border-radius:12px;padding:16px;margin-bottom:14px}
.box-title{font-size:.7rem;color:#6b7280;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;font-weight:700}
.topbar{background:#1a1d27;border-bottom:1px solid #2e3248;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:200}
.brand{font-weight:800;color:#6c63ff;font-size:1.1rem}
.role-tag{font-size:.7rem;color:#6b7280}
.tabs{display:flex;gap:4px;background:#22263a;border-radius:10px;padding:4px;margin:12px 0}
.tab{flex:1;padding:8px 4px;text-align:center;border:none;background:transparent;color:#6b7280;font-size:.8rem;font-weight:700;cursor:pointer;border-radius:7px}
.tab.on{background:#6c63ff;color:#fff}
.field{margin-bottom:12px}
.field label{display:block;font-size:.65rem;color:#6b7280;margin-bottom:4px;text-transform:uppercase;font-weight:600}
input,select{width:100%;background:#22263a;border:1px solid #2e3248;color:#e8eaf6;border-radius:8px;padding:10px;font-size:.9rem;outline:none}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px;border:none;border-radius:8px;font-size:.85rem;font-weight:700;cursor:pointer;transition:0.1s}
.btn:disabled{opacity:0.5;cursor:not-allowed}
.btn-full{width:100%}
.btn-purple{background:#6c63ff;color:#fff}
.btn-green{background:#10b981;color:#fff}
.btn-gray{background:#22263a;color:#e8eaf6;border:1px solid #2e3248}
.srow{display:flex;gap:8px}.srow input{flex:1}
.stats-bar{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.stat-chip{background:#1a1d27;border:1px solid #2e3248;border-radius:10px;padding:10px;flex:1;text-align:center}
.stat-num{font-size:1.3rem;font-weight:800;font-family:monospace}
.stat-lbl{font-size:.65rem;color:#6b7280;text-transform:uppercase}
.lr-card{background:#1a1d27;border:1px solid #2e3248;border-radius:12px;padding:16px;margin-top:10px}
.lr-head{display:flex;justify-content:space-between;margin-bottom:10px}
.lr-num{font-size:1.1rem;font-weight:800;color:#00d4aa;font-family:monospace}
.badge{font-size:.65rem;font-weight:800;padding:4px 10px;border-radius:20px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.kv span{font-size:.65rem;color:#6b7280;text-transform:uppercase;display:block}
.kv strong{font-size:.85rem}
.tbl-wrap{overflow-x:auto;border-radius:8px;border:1px solid #2e3248;margin-top:10px}
table{width:100%;border-collapse:collapse;font-size:.75rem}
th{background:#22263a;padding:8px;text-align:left;color:#6b7280;text-transform:uppercase}
td{padding:8px;border-top:1px solid #2e3248;white-space:nowrap}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(30px);background:#1a1d27;border:1px solid #2e3248;color:#e8eaf6;padding:10px 20px;border-radius:8px;font-size:.8rem;opacity:0;transition:0.3s;z-index:9999}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:#10b981;color:#10b981}
.toast.err{border-color:#ef4444;color:#ef4444}
.logout{background:none;border:none;color:#6b7280;cursor:pointer}
</style>
</head>
<body>
<div id="toast" class="toast"></div>

<!-- LOGIN PAGE -->
<div id="pg-login" class="center">
  <div class="card">
    <div style="font-size:2rem;font-weight:900;color:#6c63ff;margin-bottom:4px">TMS</div>
    <div style="color:#6b7280;font-size:.8rem;margin-bottom:24px">Logistics Management</div>
    <div class="field"><label>Username</label><input id="inp-u" placeholder="Enter username"/></div>
    <div class="field"><label>Password</label><input id="inp-p" type="password" placeholder="Enter password"/></div>
    <button class="btn btn-purple btn-full" id="btn-login" onclick="doLogin()">Login</button>
    <div id="login-err" style="margin-top:10px;font-size:.8rem;color:#ef4444;text-align:center"></div>
  </div>
</div>

<!-- WH PANEL -->
<div id="pg-wh" class="page">
  <div class="topbar"><div><div class="brand">TMS</div><div class="role-tag" id="wh-tag"></div></div><button class="logout" onclick="doLogout()">Logout</button></div>
  <div class="tabs">
    <button class="tab on" id="wt-up" onclick="whTab('up')">📤 Upload</button>
    <button class="tab" id="wt-sr" onclick="whTab('sr')">🔍 Search</button>
  </div>
  <div id="wp-up">
    <div id="wh-stats" class="stats-bar"></div>
    <div class="box">
      <div class="box-title">Upload LR Master</div>
      <input type="file" id="wh-file" accept=".xlsx,.csv" style="margin-bottom:10px"/>
      <button class="btn btn-green btn-full" id="btn-wh-up" onclick="doWHUpload()">Process Upload</button>
      <div class="log" id="wh-log"></div>
    </div>
  </div>
  <div id="wp-sr" style="display:none">
    <div class="box"><div class="srow"><input id="wh-lr" placeholder="LR Number"/><button class="btn btn-gray" onclick="doWHSearch()">Search</button></div></div>
    <div id="wh-result"></div>
  </div>
</div>

<!-- STORE PANEL -->
<div id="pg-store" class="page">
  <div class="topbar"><div><div class="brand">TMS</div><div class="role-tag" id="store-tag"></div></div><button class="logout" onclick="doLogout()">Logout</button></div>
  <div class="box"><div class="srow"><input id="store-lr" placeholder="Track LR"/><button class="btn btn-gray" onclick="doStoreSearch()">Track</button></div></div>
  <div id="store-result"></div>
</div>

<!-- TRANSPORTER PANEL -->
<div id="pg-trans" class="page">
  <div class="topbar"><div><div class="brand">TMS</div><div class="role-tag" id="trans-tag"></div></div><button class="logout" onclick="doLogout()">Logout</button></div>
  <div class="box">
    <div class="box-title">Find Shipment</div>
    <div class="srow"><input id="trans-lr" placeholder="LR Number"/><button class="btn btn-gray" onclick="doTransSearch()">Search</button></div>
  </div>

  <div id="trans-result"></div>

  <div id="trans-actions" style="display:none" class="box">
    <div class="box-title">Update Status & Scan Copy</div>
    <div class="field">
      <label>Current Status</label>
      <select id="trans-status-select" onchange="toggleDeliveryUI()">
        <option value="In Transit">In Transit</option>
        <option value="Reached WH">Reached WH</option>
        <option value="Out for Delivery">Out for Delivery</option>
        <option value="Delivered">Delivered (Scan LR Copy)</option>
      </select>
    </div>
    
    <div id="delivery-ui" style="display:none; border-top:1px solid #2e3248; padding-top:12px; margin-top:12px">
      <div style="display:flex; gap:8px; margin-bottom:12px">
        <button class="btn btn-gray" style="flex:1" onclick="triggerCamera()">📷 Take Photo</button>
        <button class="btn btn-gray" style="flex:1" onclick="triggerGallery()">🖼 Gallery</button>
      </div>
      <div id="photo-preview-box" style="display:none; text-align:center; margin-bottom:12px">
        <img id="trans-preview-img" style="max-width:100%; border-radius:8px; border:1px solid #10b981"/>
        <div id="photo-info" style="font-size:.7rem; color:#10b981; margin-top:4px; font-weight:bold"></div>
      </div>
      <input type="file" id="hidden-cam" accept="image/*" capture="environment" style="display:none" onchange="handleFile(this)"/>
      <input type="file" id="hidden-gal" accept="image/*" style="display:none" onchange="handleFile(this)"/>
    </div>

    <button class="btn btn-green btn-full" id="btn-unified-up" onclick="doUnifiedUpdate()">Update Status</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-storage-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyAPu5_BwUEu_xXdpXkmOJbuErGCGYqBUeE",
  authDomain:"wh-logistics-system.firebaseapp.com",
  projectId:"wh-logistics-system",
  storageBucket:"wh-logistics-system.firebasestorage.app",
  messagingSenderId:"279467148642",
  appId:"1:279467148642:web:c458996bca6c85ed33983b"
});
const db=firebase.firestore(), ST=firebase.storage(), TS=()=>firebase.firestore.FieldValue.serverTimestamp();
const $=id=>document.getElementById(id);
let CU=null, pendingBlob=null;

function toast(msg,type=''){
  const t=$('toast'); t.textContent=msg; t.className='toast on '+(type==='ok'?'ok':type==='err'?'err':'');
  setTimeout(()=>t.classList.remove('on'),3000);
}

function showPage(id){
  ['pg-login','pg-wh','pg-store','pg-trans'].forEach(p=>$(p).style.display=p===id?(p==='pg-login'?'flex':'block'):'none');
}

async function doLogin(){
  const u=$('inp-u').value.trim(), p=$('inp-p').value.trim();
  if(!u||!p)return toast('Enter credentials','err');
  const snap=await db.collection('users').doc(u).get();
  if(!snap.exists||snap.data().password!==p)return toast('Invalid login','err');
  CU={username:u,...snap.data()}; goRole();
}

function doLogout(){ CU=null; $('inp-u').value=''; $('inp-p').value=''; showPage('pg-login'); }

function goRole(){
  const r=CU.role;
  if(r==='WH'){ showPage('pg-wh'); $('wh-tag').textContent=`WH · ${CU.username}`; }
  else if(r==='Store'){ showPage('pg-store'); $('store-tag').textContent=`Store · ${CU.store_code}`; }
  else if(r==='Transporter'){ showPage('pg-trans'); $('trans-tag').textContent=`Transporter · ${CU.username}`; }
}

// TRANSPORTER LOGIC
function toggleDeliveryUI(){
  $('delivery-ui').style.display=$('trans-status-select').value==='Delivered'?'block':'none';
}
function triggerCamera(){ $('hidden-cam').click(); }
function triggerGallery(){ $('hidden-gal').click(); }

async function handleFile(input){
  const file=input.files[0]; if(!file)return;
  toast("Processing image...");
  pendingBlob = await compressImg(file, 800, 0.6);
  $('trans-preview-img').src = URL.createObjectURL(pendingBlob);
  $('photo-preview-box').style.display = 'block';
  $('photo-info').textContent = `Optimized: ${Math.round(pendingBlob.size/1024)}KB`;
}

async function doTransSearch(){
  const lr=$('trans-lr').value.trim().toUpperCase();
  if(!lr)return toast("Enter LR No","err");
  const s=await db.collection('lr_master').doc(lr).get();
  if(!s.exists)return toast("LR Not Found","err");
  const d=s.data();
  const invs=await db.collection('invoices').where('lr_no','==',lr).get();
  $('trans-result').innerHTML=lrCard(lr,d,invs.docs.map(x=>x.data()));
  $('trans-actions').style.display='block';
  $('trans-actions').dataset.lr=lr;
  $('trans-status-select').value=d.status||'In Transit';
  toggleDeliveryUI();
}

async function doUnifiedUpdate(){
  const lr=$('trans-actions').dataset.lr;
  const status=$('trans-status-select').value;
  const btn=$('btn-unified-up');
  
  if(status==='Delivered' && !pendingBlob) return toast("Scan required","err");

  btn.disabled = true;
  btn.textContent = "Updating...";

  try {
    let upData = { status, last_updated:TS(), updated_by:CU.username };
    
    if(pendingBlob){
      const ref=ST.ref(`lr_copies/${lr}_${Date.now()}.jpg`);
      const uploadTask = await ref.put(pendingBlob);
      upData.photo_url = await uploadTask.ref.getDownloadURL();
    }

    await db.collection('lr_master').doc(lr).update(upData);
    toast("Success","ok");
    
    // Clear form and refresh
    pendingBlob = null;
    $('photo-preview-box').style.display = 'none';
    await doTransSearch();
  } catch(e) {
    toast("Failed: "+e.message,"err");
  } finally {
    btn.disabled = false;
    btn.textContent = "Update Status";
  }
}

function lrCard(lr,d,invs){
  const c=d.status==='Delivered'?'#10b981':'#f59e0b';
  return `<div class="lr-card">
    <div class="lr-head">
      <div class="lr-num">${lr}</div>
      <span class="badge" style="background:${c}22;color:${c}">${d.status}</span>
    </div>
    <div class="grid2">
      <div class="kv"><span>Store</span><strong>${d.to_code}</strong></div>
      <div class="kv"><span>Transporter</span><strong>${d.transporter||'—'}</strong></div>
    </div>
    ${d.photo_url ? `<div style="margin-top:10px"><img src="${d.photo_url}" style="width:100%;border-radius:8px;border:1px solid #2e3248"/></div>`:''}
    <div class="tbl-wrap">
      <table><thead><tr><th>Invoice</th><th>Qty</th></tr></thead>
      <tbody>${invs.map(i=>`<tr><td>${i.invoice_no}</td><td>${i.invoice_qty}</td></tr>`).join('')}</tbody></table>
    </div>
  </div>`;
}

function compressImg(file,maxW,q){
  return new Promise(res=>{
    const img=new Image(); img.src=URL.createObjectURL(file);
    img.onload=()=>{
      let w=img.width, h=img.height; if(w>maxW){ h=Math.round(h*maxW/w); w=maxW; }
      const c=document.createElement('canvas'); c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      c.toBlob(b=>res(b),'image/jpeg',q);
    }
  });
}

function whTab(t){ $('wp-up').style.display=t==='up'?'block':'none'; $('wp-sr').style.display=t==='sr'?'block':'none'; }
showPage('pg-login');
</script>
</body>
</html>
